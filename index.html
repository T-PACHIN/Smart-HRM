
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BOMB HR Enterprise Portal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:"Noto Sans TC",Arial,sans-serif;
background:linear-gradient(135deg,#071321,#10243a);
color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;
overflow:hidden}
body:before{
content:"";position:fixed;inset:0;
background:
radial-gradient(circle at 20% 20%,rgba(0,180,255,.15),transparent 30%),
radial-gradient(circle at 80% 30%,rgba(108,255,81,.10),transparent 35%);
}
.wrap{position:relative;z-index:2;width:min(1200px,92%);text-align:center}
.logo{max-width:620px;width:85%;filter:drop-shadow(0 25px 45px rgba(0,0,0,.45))}
h1{margin:24px 0 10px;font-size:58px;letter-spacing:-1px}
p{color:#c5d2df;font-size:22px;margin-bottom:48px}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.12);
border-radius:26px;
padding:34px;
text-decoration:none;color:#fff;
transition:.25s}
.card:hover{transform:translateY(-8px);border-color:#6ddcff;box-shadow:0 20px 40px rgba(0,0,0,.25)}
.card h2{margin:12px 0;font-size:28px}
.card p{font-size:16px;margin:0;color:#b9c8d8;line-height:1.8}
.icon{font-size:48px}
.footer{margin-top:42px;color:#8ea4bb;font-size:14px}
@media(max-width:900px){
.cards{grid-template-columns:1fr}
h1{font-size:40px}
p{font-size:18px}
}
</style>
</head>
<body>
<div class="wrap">
<img class="logo" src="V13_Ultimate_assets/bombhr-logo.png" alt="BOMB HR">
<h1>BOMB HR</h1>
<p>打造企業智慧人力資源管理中樞</p>

<div class="cards">
<a class="card" href="./website/">
<div class="icon">🌐</div>
<h2>官方網站</h2>
<p>產品介紹、解決方案、價格方案、成功案例與聯絡我們。</p>
</a>

<a class="card" href="./app/">
<div class="icon">👤</div>
<h2>員工服務平台</h2>
<p>打卡、請假、加班、簽核、薪資單與個人資訊。</p>
</a>

<a class="card" href="./admin/">
<div class="icon">🏢</div>
<h2>管理後台</h2>
<p>組織、人事、薪資、出勤、報表、AI 分析與權限管理。</p>
</a>
</div>

<div class="footer">
Enterprise Workforce Platform · Portal V13 Ultimate
</div>
</div>
</body>
</html>
